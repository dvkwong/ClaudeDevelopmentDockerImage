services:
  claude-dev-local:
    build:
      context: .
    image: claude-dev-local:dev
    container_name: ${LOCAL_CONTAINER_NAME:-claude-dev-local}
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - GH_TOKEN=${GH_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
    volumes:
      - ./.docker-test/workspace:/workspace
      - ./.docker-test/home:/home/devuser
      - ./.docker-test/root:/root
    stdin_open: true
    tty: true
    restart: unless-stopped