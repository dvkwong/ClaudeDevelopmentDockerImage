services:
  claude-dev:
    # Pull the pre-built image from GitHub Container Registry.
    # The image is built and published automatically on every push to main.
    image: ghcr.io/dvkwong/claudedevelopmentdockerimage:latest
    container_name: ${INSTANCE_NAME:-claude-dev}
    environment:
      # Unraid default UIDs — change to match your host user if needed.
      # Set both to 0 to run as root.
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
    volumes:
      # Primary workspace — map to a share on your Unraid array.
      - /mnt/user/appdata/${INSTANCE_NAME:-claude-dev}/workspace:/workspace
      # Persist non-root auth, dotfiles, and user-space tooling.
      - /mnt/user/appdata/${INSTANCE_NAME:-claude-dev}/home:/home/devuser
      # Persist root auth and config for sessions opened as root.
      - /mnt/user/appdata/${INSTANCE_NAME:-claude-dev}/root:/root
    stdin_open: true
    tty: true
    restart: unless-stopped
